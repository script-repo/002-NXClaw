name: Build and push NXClaw images
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t nxclaw-api:latest .
      - name: Build Portal image
        run: docker build -f apps/portal/Dockerfile -t nxclaw-portal:latest .
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push API image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/nxclaw-api:latest
          docker tag nxclaw-api:latest $IMAGE
          docker push $IMAGE
      - name: Push Portal image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/nxclaw-portal:latest
          docker tag nxclaw-portal:latest $IMAGE
          docker push $IMAGE
      - name: Deploy instructions
        run: |
          echo "## Images pushed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "API: \`ghcr.io/${{ github.repository_owner }}/nxclaw-api:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "Portal: \`ghcr.io/${{ github.repository_owner }}/nxclaw-portal:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deploy to Kubernetes" >> $GITHUB_STEP_SUMMARY
          echo "1. Set overlay to this registry (replace \`REPO_OWNER\` with \`${{ github.repository_owner }}\`):" >> $GITHUB_STEP_SUMMARY
          echo "   - **Unix:** \`./scripts/set-registry.sh ${{ github.repository_owner }}\`" >> $GITHUB_STEP_SUMMARY
          echo "   - **Windows:** \`.\\scripts\\set-registry.ps1 -Owner ${{ github.repository_owner }}\`" >> $GITHUB_STEP_SUMMARY
          echo "2. Apply: \`kubectl apply -k infra/overlays/default\`" >> $GITHUB_STEP_SUMMARY
