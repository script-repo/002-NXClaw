apiVersion: apps/v1
kind: Deployment
metadata:
  name: nxclaw-api
  namespace: nxclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nxclaw-api
  template:
    metadata:
      labels:
        app: nxclaw-api
    spec:
      containers:
        - name: api
          image: nxclaw-api:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              value: "postgresql://nxclaw:nxclaw-db-secret-change-me@nxclaw-postgres.nxclaw.svc.cluster.local:5432/nxclaw"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nxclaw-api-secret
                  key: jwt-secret
            - name: PORT
              value: "3000"
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: nxclaw-api
  namespace: nxclaw
spec:
  selector:
    app: nxclaw-api
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: v1
kind: Secret
metadata:
  name: nxclaw-api-secret
  namespace: nxclaw
type: Opaque
stringData:
  jwt-secret: "nxclaw-jwt-secret-change-in-production"
