apiVersion: apps/v1
kind: Deployment
metadata:
  name: nxclaw-portal
  namespace: nxclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nxclaw-portal
  template:
    metadata:
      labels:
        app: nxclaw-portal
    spec:
      containers:
        - name: portal
          image: nginx:alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: static
              mountPath: /usr/share/nginx/html
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 10
      volumes:
        - name: static
          configMap:
            name: nxclaw-portal-static
---
apiVersion: v1
kind: Service
metadata:
  name: nxclaw-portal
  namespace: nxclaw
spec:
  selector:
    app: nxclaw-portal
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
