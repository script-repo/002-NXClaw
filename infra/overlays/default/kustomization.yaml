# Overlay: image registry. Replace script-repo with your GitHub org/user (e.g. DaemonBehr).
# After Build and push workflow runs, use: ./scripts/set-registry.sh script-repo  or  .\scripts\set-registry.ps1 script-repo
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
images:
  - name: nxclaw-api:latest
    newName: ghcr.io/REPO_OWNER/nxclaw-api
    newTag: latest
  - name: nxclaw-portal:latest
    newName: ghcr.io/REPO_OWNER/nxclaw-portal
    newTag: latest
